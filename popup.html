<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Lume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Specific styles for popup */
    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

  </style>
</head>
<body>
  <!-- Header with logo and toggle -->
  <div class="header">
    <div class="logo">
      <div class="wrapper-header">
        <img src="icons/icon128.png" alt="Lume Logo" width="32" height="32">
        <div class="logo-name">Lume</div>
      </div>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label">Analisi Attiva</span>
      <label class="toggle" aria-label="enable extension">
        <input type="checkbox" id="enableToggle">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </div>

  <!-- Main Box Wrapper-->
  <div class="section">
    <!-- Alert Risk Api box -->
    <div class="wrapper-alert-box">
      <span style="color: var(--alert); font-size: 10px;">
        L'estenzione utilizza il modello gemini-3.1-flash-lite per l'elaborazione e la classificazione dei risultati di ricerca.
      </span>
    </div>

    <!-- Legend with categories filter -->
    <div class="legend">
      <div class="section-title">Filtri per Categoria</div>
      <div class="filter-hint">Deseleziona per nascondere quei risultati</div>
      <div class="legend-grid">
        <label class="legend-item filter-toggle" data-cat="expert">
          <input type="checkbox" class="cat-check" data-cat="expert" checked>
          <div class="legend-dot" style="background: var(--expert)"></div>
          <div class="legend-text">Fonte Autorevole</div>
        </label>
        <label class="legend-item filter-toggle" data-cat="news">
          <input type="checkbox" class="cat-check" data-cat="news" checked>
          <div class="legend-dot" style="background: var(--news)"></div>
          <div class="legend-text">Media / Notizie</div>
        </label>
        <label class="legend-item filter-toggle" data-cat="community">
          <input type="checkbox" class="cat-check" data-cat="community" checked>
          <div class="legend-dot" style="background: var(--community)"></div>
          <div class="legend-text">Community</div>
        </label>
        <label class="legend-item filter-toggle" data-cat="commercial">
          <input type="checkbox" class="cat-check" data-cat="commercial" checked>
          <div class="legend-dot" style="background: var(--commercial)"></div>
          <div class="legend-text">Shop / Commerciale</div>
        </label>
        <label class="legend-item filter-toggle" data-cat="ads">
          <input type="checkbox" class="cat-check" data-cat="ads" checked>
          <div class="legend-dot" style="background: var(--ads)"></div>
          <div class="legend-text">Ads / SEO Spam</div>
        </label>
        <label class="legend-item filter-toggle" data-cat="lowquality">
          <input type="checkbox" class="cat-check" data-cat="lowquality" checked>
          <div class="legend-dot" style="background: var(--lowquality)"></div>
          <div class="legend-text">Bassa Qualità</div>
        </label>
      </div>
    </div>

  <!-- Status bar info text-->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText"></span>
  </div>

  <div class="privacy-policy">
    <a href="https://lucabracaloni.github.io/Lume/privacy.html" target="_blank" style="color: var(--accent);">
      Leggi la Privacy Policy
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
